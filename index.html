<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Tracking - My Tracking</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: Lato, system-ui, sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .striped-bg {
      background-image: repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.15) 4px,rgba(255,255,255,0.15) 8px);
    }
    .tooltip-trigger { position: relative; cursor: help; }
    .tooltip-trigger .tooltip-text {
      visibility: hidden; opacity: 0; transition: opacity 0.2s;
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; font-size: 11px; font-style: normal;
      padding: 6px 10px; border-radius: 6px; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 200;
      max-width: 320px; white-space: normal; line-height: 1.4; text-align: center;
    }
    .tooltip-trigger .tooltip-text::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 5px solid transparent; border-top-color: #1f2937;
    }
    .tooltip-trigger:hover .tooltip-text { visibility: visible; opacity: 1; }
    .toast {
      animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 3.7s forwards;
    }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createElement: h } = React;

    const DAILY_CAP_MINS = 480;
    const MAX_DAILY_MINS = 1440;

    const formatMins = (totalMins) => {
      if (totalMins <= 0) return '0h';
      const hh = Math.floor(totalMins / 60);
      const m = totalMins % 60;
      if (hh > 0 && m > 0) return `${hh}h ${m}m`;
      if (hh > 0) return `${hh}h`;
      return `${m}m`;
    };

    const parseMins = (str) => {
      if (!str) return 0;
      const hMatch = str.match(/(\d+)\s*h/);
      const mMatch = str.match(/(\d+)\s*m/);
      const hh = hMatch ? parseInt(hMatch[1]) * 60 : 0;
      const m = mMatch ? parseInt(mMatch[1]) : 0;
      if (!hMatch && !mMatch && !isNaN(parseInt(str))) return parseInt(str) * 60;
      return hh + m;
    };

    /* ===== ICON HELPERS ===== */
    const Icon = ({ name, size, className, color }) =>
      h('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size || 18, height: size || 18,
        viewBox: '0 0 24 24', fill: 'none',
        stroke: color || 'currentColor',
        strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
        className
      }, h('path', { d: ICON_PATHS[name] || '' }));

    const ICON_PATHS = {
      Briefcase: 'M20 13V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7m16 0v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-5m16 0h-2.586a1 1 0 0 0-.707.293l-2.414 2.414a1 1 0 0 1-.707.293h-3.172a1 1 0 0 1-.707-.293l-2.414-2.414A1 1 0 0 0 6.586 13H4',
      CheckSquare: 'M9 11l3 3L22 4m-1 8v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11',
      LayoutGrid: 'M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z',
      LayoutDashboard: 'M3 9h18M3 15h18M9 3v18M15 3v18',
      CalendarRange: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z',
      Clock: 'M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z',
      User: 'M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM12 14c-4.418 0-8 1.79-8 4v2h16v-2c0-2.21-3.582-4-8-4z',
      CalendarClock: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2zm7-4a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm0 0l2 2',
      ClipboardList: 'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9h2m2 0h2m-6 4h2m2 0h2',
      Timer: 'M12 6v6l4 2m-2-2h2m-2-8a9 9 0 1 0 0 18 9 9 0 0 0 0-18z',
      Search: 'M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z',
      Bell: 'M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0',
      Settings: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z',
      Info: 'M12 16v-4M12 8h.01M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z',
      AlertTriangle: 'M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01',
      X: 'M18 6L6 18M6 6l12 12',
    };

    const ChevronDown = ({ size }) =>
      h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: size||14, height: size||14, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        h('path', { d: 'M6 9l6 6 6-6' })
      );

    /* ===== SUBCOMPONENTS ===== */
    const NavItem = ({ icon, label, hasChild }) =>
      h('div', { className: 'flex items-center px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 cursor-pointer' },
        h('span', { className: 'text-gray-400 mr-3' }, h(Icon, { name: icon, size: 18 })),
        h('span', { className: 'flex-1' }, label),
        hasChild && h(ChevronDown, { size: 14 })
      );

    const SubNavItem = ({ icon, label }) =>
      h('div', { className: 'flex items-center px-4 py-2 pl-11 text-[13px] text-gray-600 hover:bg-gray-50 cursor-pointer' },
        h('span', { className: 'text-gray-400 mr-3' }, h(Icon, { name: icon, size: 16 })),
        label
      );

    /* ===== APP ===== */
    function App() {
      const [isTimerDropdownOpen, setIsTimerDropdownOpen] = useState(false);
      const [hoveredTask, setHoveredTask] = useState(null);
      const dropdownRef = useRef(null);
      const [isTimerRunning, setIsTimerRunning] = useState(false);
      const [activeTimerTask, setActiveTimerTask] = useState(null);
      const [timerSeconds, setTimerSeconds] = useState(0);
      const [isStartConfirmOpen, setIsStartConfirmOpen] = useState(false);
      const [taskToStart, setTaskToStart] = useState(null);
      const [isStopConfirmOpen, setIsStopConfirmOpen] = useState(false);
      const [isLogWorkModalOpen, setIsLogWorkModalOpen] = useState(false);
      const [isTimeInfoEnabled, setIsTimeInfoEnabled] = useState(false);
      const [totalLoggedMins, setTotalLoggedMins] = useState(420);
      const [logContext, setLogContext] = useState({ type: 'manual', actualLoggedMins: 0 });
      const [durationInput, setDurationInput] = useState('');
      const [isEditedByUser, setIsEditedByUser] = useState(false);

      const [isExtraTimeOnManually, setIsExtraTimeOnManually] = useState(false);
      const [isOverTimeOn, setIsOverTimeOn] = useState(false);
      const [isSyncToJiraOn, setIsSyncToJiraOn] = useState(false);
      const timerStartTimeRef = useRef(null);
      const [postSubmitMsg, setPostSubmitMsg] = useState(null);
      const [isCrossMidnight, setIsCrossMidnight] = useState(false);

      const mockTasks = [
        { id: 'XCOR-22811', name: 'Cập nhật logic Timer: Giới hạn tổng thời gian log trong ngày' },
        { id: 'XCOR-22051', name: '[OKR] OKR Template' },
      ];

      useEffect(() => {
        let interval = null;
        if (isTimerRunning) {
          interval = setInterval(() => setTimerSeconds(s => s + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [isTimerRunning]);

      const formatTimerDisplay = (totalSeconds) => {
        const hh = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${String(hh).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      };

      const handleStartTaskClick = (task) => {
        setTaskToStart(task);
        setIsStartConfirmOpen(true);
        setIsTimerDropdownOpen(false);
      };

      const confirmStartTimer = () => {
        setActiveTimerTask(taskToStart);
        setTimerSeconds(0);
        setIsTimerRunning(true);
        setIsStartConfirmOpen(false);
        timerStartTimeRef.current = Date.now();
        setIsCrossMidnight(false);
      };

      const confirmStopTimer = () => {
        setIsTimerRunning(false);
        setIsStopConfirmOpen(false);
        setIsTimeInfoEnabled(true);
        const actualLogged = timerSeconds > 0 ? timerSeconds : 0;
        setLogContext({ type: 'timer', actualLoggedMins: actualLogged });
        setDurationInput(formatMins(actualLogged));
        setIsEditedByUser(false);

        if (timerStartTimeRef.current) {
          const startDate = new Date(timerStartTimeRef.current);
          const now = new Date();
          if (startDate.getDate() !== now.getDate() || startDate.getMonth() !== now.getMonth() || startDate.getFullYear() !== now.getFullYear()) {
            setIsCrossMidnight(true);
          } else {
            setIsCrossMidnight(false);
          }
        }
        timerStartTimeRef.current = null;
        setIsLogWorkModalOpen(true);
      };

      const handleManualLogWork = () => {
        if (!activeTimerTask) setActiveTimerTask(mockTasks[1]);
        setIsTimeInfoEnabled(false);
        const remainingSnapshot = Math.max(0, DAILY_CAP_MINS - totalLoggedMins);
        setLogContext({ type: 'manual', actualLoggedMins: 0 });
        setDurationInput(formatMins(remainingSnapshot));
        setIsEditedByUser(false);
        setIsLogWorkModalOpen(true);
      };

      const handleDurationChange = (e) => {
        setDurationInput(e.target.value);
        setIsEditedByUser(true);
      };

      const handleSubmit = () => {
        if (isOver24h) return;
        const submittedMins = parseMins(durationInput);
        if (submittedMins <= 0) {
          setIsLogWorkModalOpen(false);
          return;
        }
        const newTotal = totalLoggedMins + submittedMins;
        setTotalLoggedMins(newTotal);
        const exceeded = newTotal > DAILY_CAP_MINS;
        if (exceeded) {
          setPostSubmitMsg(`Worklog saved. Today's total: ${formatMins(newTotal)} - You are Extra/OT by ${formatMins(newTotal - DAILY_CAP_MINS)}.`);
        } else {
          setPostSubmitMsg(`Worklog saved. Today's total: ${formatMins(newTotal)}. Remaining: ${formatMins(DAILY_CAP_MINS - newTotal)}.`);
        }
        setTimeout(() => setPostSubmitMsg(null), 4000);
        setIsLogWorkModalOpen(false);
      };

      const inputMins = parseMins(durationInput);
      const remainingTotal = DAILY_CAP_MINS - totalLoggedMins;
      const projectedTotal = totalLoggedMins + inputMins;
      const isOverLimit = projectedTotal > DAILY_CAP_MINS;
      const isOver24h = projectedTotal > MAX_DAILY_MINS;
      const overTimeMins = projectedTotal - DAILY_CAP_MINS;

      const isTimerMode = logContext.type === 'timer';
      const actualMins = logContext.actualLoggedMins;
      const remainingIsPositive = remainingTotal > 0;
      const actualExceedsRemaining = actualMins > remainingTotal;
      const effectiveOverMins = Math.max(0, overTimeMins);

      let durationTag = '';
      let tagColor = '';
      if (isEditedByUser) {
        durationTag = 'USER EDITED';
        tagColor = 'bg-gray-600 text-white';
      } else if (inputMins === 0) {
        durationTag = 'NO REMAINING';
        tagColor = 'bg-[#fef08a] text-[#854d0e] border border-[#fde047]';
      } else {
        durationTag = 'AUTO-FILL';
        tagColor = 'bg-blue-600 text-white';
      }

      const isExtraTimeAuto = remainingTotal <= 0 || (isEditedByUser && isOverLimit);

      const toggleConfigs = [
        { label: 'Extra Time', isOn: isExtraTimeOnManually || isExtraTimeAuto, activeColor: '#f59e0b', onToggle: () => setIsExtraTimeOnManually(!isExtraTimeOnManually) },
        { label: 'Over Time', isOn: isOverTimeOn, activeColor: '#2563eb', onToggle: () => setIsOverTimeOn(!isOverTimeOn) },
        { label: 'Time Info', isOn: isTimeInfoEnabled, activeColor: '#2563eb', onToggle: () => setIsTimeInfoEnabled(!isTimeInfoEnabled) },
        { label: 'Sync to Jira', isOn: isSyncToJiraOn, activeColor: '#2563eb', onToggle: () => setIsSyncToJiraOn(!isSyncToJiraOn) },
      ];

      return h('div', { className: 'flex h-screen w-full bg-white font-sans text-gray-800 overflow-hidden relative' },

        /* ===== SIDEBAR ===== */
        h('aside', { className: 'w-[240px] border-r border-gray-200 flex flex-col relative bg-white z-10 shrink-0' },
          h('div', { className: 'h-12 flex items-center px-4' },
            h('div', { className: 'flex items-center gap-2' },
              h('div', { className: 'w-6 h-6 rounded-full bg-orange-500 flex items-center justify-center' },
                h('div', { className: 'w-3 h-3 bg-white rotate-45 transform' })
              ),
              h('span', { className: 'font-bold text-gray-700 tracking-wide' }, 'XCORP')
            )
          ),
          h('button', { className: 'absolute -right-3 top-12 w-6 h-6 bg-white border border-gray-200 rounded-full flex items-center justify-center shadow-sm text-gray-400 hover:text-gray-600 z-20' },
            h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 14, height: 14, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
              h('path', { d: 'M15 18l-6-6 6-6' })
            )
          ),
          h('div', { className: 'flex-1 overflow-y-auto py-2 custom-scrollbar' },
            h(NavItem, { icon: 'Briefcase', label: 'Workflow', hasChild: true }),
            h(NavItem, { icon: 'CheckSquare', label: 'Approval', hasChild: true }),
            h(NavItem, { icon: 'LayoutGrid', label: 'Eisenhower' }),
            h(NavItem, { icon: 'LayoutDashboard', label: 'Dashboard' }),
            h(NavItem, { icon: 'CalendarRange', label: 'Leave', hasChild: true }),
            h('div', { className: 'mb-1' },
              h('div', { className: 'flex items-center px-4 py-2 text-sm text-blue-600 bg-blue-50 cursor-pointer' },
                h('span', { className: 'text-blue-600 mr-3' }, h(Icon, { name: 'Clock', size: 18 })),
                h('span', { className: 'flex-1 font-medium' }, 'Work Tracking'),
                h(ChevronDown, { size: 16 })
              ),
              h('div', { className: 'flex flex-col py-1' },
                h(SubNavItem, { icon: 'ClipboardList', label: 'Checkin Report' }),
                h('div', { className: 'flex items-center px-4 py-2 pl-11 text-[13px] text-blue-600 font-medium relative cursor-pointer' },
                  h('div', { className: 'absolute left-0 top-0 bottom-0 w-[3px] bg-blue-600' }),
                  h(Icon, { name: 'User', size: 16 }),
                  h('span', { className: 'ml-3' }, 'My Tracking')
                )
              )
            ),
            h(NavItem, { icon: 'CalendarClock', label: 'Timesheet', hasChild: true })
          )
        ),

        /* ===== MAIN CONTENT ===== */
        h('main', { className: 'flex-1 flex flex-col min-w-0 bg-[#f4f6f8]' },

          /* --- Header --- */
          h('header', { className: 'h-12 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0 relative z-40' },
            h('div', { className: 'flex items-center text-[11px] font-semibold text-gray-500 tracking-wider' },
              h('span', { className: 'hover:text-gray-800 cursor-pointer' }, 'XCORP'),
              h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 14, height: 14, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', className: 'mx-1' },
                h('path', { d: 'M9 18l6-6-6-6' })
              ),
              h('span', { className: 'text-gray-800' }, 'MY TRACKING')
            ),
            h('div', { className: 'flex items-center space-x-4' },

              /* Timer */
              h('div', { className: 'relative', ref: dropdownRef },
                !isTimerRunning
                  ? h('button', { onClick: () => setIsTimerDropdownOpen(!isTimerDropdownOpen), className: 'flex items-center px-3 py-1.5 text-xs font-semibold text-blue-600 bg-blue-50 border border-blue-100 rounded hover:bg-blue-100 transition-colors' },
                      h(Icon, { name: 'Timer', size: 14 }),
                      h('span', { className: 'ml-1.5' }, 'START TIMER')
                    )
                  : h('div', { className: 'flex items-center px-3 py-1 bg-[#eaf4ec] text-[#052e16] rounded border border-green-200' },
                      h('span', { className: 'font-bold mr-2 text-[13px]' }, activeTimerTask?.id),
                      h('span', { className: 'font-mono text-[13px] text-blue-800 mr-3' }, formatTimerDisplay(timerSeconds)),
                      h('button', { onClick: () => setIsStopConfirmOpen(true), className: 'w-5 h-5 bg-[#d9534f] rounded-full flex items-center justify-center hover:bg-red-600 transition-colors' },
                        h('div', { className: 'w-2 h-2 bg-white rounded-sm' })
                      )
                    ),

                isTimerDropdownOpen && h('div', { className: 'absolute top-full right-0 mt-1 w-[400px] bg-white border border-gray-200 rounded shadow-lg z-50 overflow-hidden' },
                  h('div', { className: 'p-2 border-b border-gray-100 relative' },
                    h('input', { type: 'text', placeholder: 'Search', className: 'w-full pl-3 pr-8 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-500' }),
                    h(Icon, { name: 'Search', size: 16, className: 'absolute right-4 top-1/2 -translate-y-1/2 text-gray-400' })
                  ),
                  h('div', { className: 'max-h-64 overflow-y-auto py-1' },
                    mockTasks.map(task =>
                      h('div', {
                        key: task.id,
                        onMouseEnter: () => setHoveredTask(task.id),
                        onMouseLeave: () => setHoveredTask(null),
                        className: 'flex items-center justify-between px-4 py-2 hover:bg-gray-50 cursor-pointer group'
                      },
                        h('div', { className: 'flex items-center truncate text-[13px]' },
                          h('span', { className: 'text-blue-600 mr-2 shrink-0' }, task.id),
                          h('span', { className: 'text-gray-700 truncate' }, task.name)
                        ),
                        hoveredTask === task.id && h('button', {
                          onClick: (e) => { e.stopPropagation(); handleStartTaskClick(task); },
                          className: 'text-blue-600 text-[13px] font-medium hover:underline bg-white pl-2 shrink-0'
                        }, 'Start')
                      )
                    )
                  )
                )
              ),

              h(Icon, { name: 'Search', size: 18, className: 'text-gray-500 cursor-pointer' }),
              h('div', { className: 'border border-gray-300 rounded text-[11px] font-bold px-1.5 py-0.5 text-gray-600 cursor-pointer' }, 'EN'),
              h(Icon, { name: 'Bell', size: 18, className: 'text-gray-500 cursor-pointer' }),
              h('div', { className: 'w-7 h-7 rounded-full bg-gray-200 overflow-hidden cursor-pointer border border-gray-300' },
                h('img', { src: 'https://i.pravatar.cc/100?img=5', alt: 'User Avatar', className: 'w-full h-full object-cover' })
              )
            )
          ),

          /* --- Content --- */
          h('div', { className: 'flex-1 overflow-auto p-6' },
            h('div', { className: 'bg-white rounded shadow-sm border border-gray-200 pb-8 min-w-[1000px]' },
              h('div', { className: 'px-6 py-4' },
                h('h1', { className: 'text-[15px] text-gray-800' }, `Daily report at May 11, 2026, working time from 09:00 to 18:00 (${Intl.DateTimeFormat().resolvedOptions().timeZone})`)
              ),
              h('div', { className: 'flex items-center justify-between px-6 mt-4 mb-6 border-b border-gray-100 pb-4' },
                h('div', { className: 'flex items-center space-x-2' },
                  h('button', { className: 'w-7 h-7 rounded border border-gray-300 flex items-center justify-center text-gray-600 hover:bg-gray-50' },
                    h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
                      h('path', { d: 'M15 18l-6-6 6-6' })
                    )
                  ),
                  h('span', { className: 'text-sm font-medium text-gray-700 mx-2' }, 'May 11 , 2026'),
                  h('button', { className: 'w-7 h-7 rounded border border-gray-300 flex items-center justify-center text-gray-600 hover:bg-gray-50' },
                    h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
                      h('path', { d: 'M9 18l6-6-6-6' })
                    )
                  ),
                  h('button', { className: 'px-3 py-1 text-sm font-medium text-white bg-[#2563eb] rounded ml-2' }, 'Today')
                ),
                h('button', { onClick: handleManualLogWork, className: 'px-4 py-1.5 text-sm font-medium text-white bg-[#2563eb] rounded hover:bg-blue-700' }, 'Log Work')
              ),

              /* Table */
              h('div', { className: 'px-6' },
                h('div', { className: 'grid grid-cols-[100px_minmax(200px,1.5fr)_120px_minmax(150px,1.2fr)] gap-4 pb-2 border-b border-gray-200 text-xs font-semibold text-gray-600' },
                  h('div', null, 'Project'),
                  h('div', null, 'Task Key'),
                  h('div', null, 'Logwork (8h)'),
                  h('div', null, 'Progress')
                ),
                h('div', { className: 'grid grid-cols-[100px_minmax(200px,1.5fr)_120px_minmax(150px,1.2fr)] gap-4 py-4 border-b border-gray-100 items-center text-[13px] text-gray-700 relative' },
                  h('div', null, 'XCORP'),
                  h('div', null,
                    h('a', { href: '#', className: 'text-blue-600 hover:underline' }, 'XCOR-22051:'),
                    ' [OKR] OKR Template'
                  ),
                  h('div', { onClick: handleManualLogWork, className: 'flex items-center text-blue-600 cursor-pointer hover:underline' },
                    h(Icon, { name: 'Clock', size: 14 }),
                    h('span', { className: 'ml-1' }, `${formatMins(totalLoggedMins)}/8h`)
                  ),
                  h('div', { className: 'flex items-center pr-4' },
                    h('div', { className: 'h-2.5 rounded-full bg-[#93c5fd] relative overflow-hidden flex-1 max-w-[150px]' },
                      h('div', { className: 'absolute inset-0 striped-bg bg-blue-500', style: { width: '80%' } })
                    ),
                    h('span', { className: 'ml-2 text-xs text-gray-500' }, '80%')
                  )
                )
              )
            )
          )
        ),

        /* ===== POST-SUBMIT TOAST ===== */
        postSubmitMsg && h('div', { className: 'fixed top-4 left-1/2 -translate-x-1/2 z-[200] bg-[#065f46] text-white px-5 py-3 rounded-lg shadow-lg toast flex items-center gap-2 text-sm' },
          h(Icon, { name: 'Info', size: 16, color: '#34d399' }),
          h('span', null, postSubmitMsg)
        ),

        /* ===== TEST SCENARIOS TOOLBAR ===== */
        h('div', { className: 'fixed bottom-6 right-6 bg-white border border-gray-300 shadow-xl rounded-lg p-4 z-50 w-72' },
          h('div', { className: 'flex items-center gap-2 mb-3 text-[#172b4d] font-bold text-sm border-b pb-2' },
            h(Icon, { name: 'Settings', size: 16 }),
            h('span', null, 'Test Scenarios (Mock Data)')
          ),
          h('p', { className: 'text-xs text-gray-500 mb-2' }, 'Change logged hours today to test Auto-fill ceilings & Warnings.'),
          h('div', { className: 'flex flex-col gap-2' },
            [
              ['0h logged (TC-01)', 0],
              ['5h logged (TC-02)', 300],
              ['7h logged (TC-04/05/06)', 420],
              ['8h logged (TC-03)', 480],
              ['9h logged (remaining < 0)', 540],
              ['24h logged (Over 24h)', 1440],
              ['Concurrent +5h (TC-07)', totalLoggedMins + 300],
            ].map(([label, val]) =>
              h('button', {
                key: label,
                onClick: () => {
                  if (label.includes('TC-07')) {
                    setPostSubmitMsg(`Simulated 2nd tab: +5h logged. Total now: ${formatMins(val)}. Extra/OT by ${formatMins(Math.max(0, val - DAILY_CAP_MINS))}.`);
                    setTimeout(() => setPostSubmitMsg(null), 4000);
                  }
                  setTotalLoggedMins(typeof val === 'function' ? val : val);
                },
                className: `text-xs px-3 py-1.5 border rounded text-left ${!label.includes('TC-07') && totalLoggedMins === val ? 'bg-blue-50 border-blue-300 text-blue-700' : 'hover:bg-gray-50'}`
              }, label)
            )
          )
        ),

        /* ===== START TIMER CONFIRM MODAL ===== */
        isStartConfirmOpen && h('div', { className: 'fixed inset-0 bg-black/40 z-[100] flex items-center justify-center' },
          h('div', { className: 'bg-white rounded shadow-xl w-[450px] overflow-hidden' },
            h('div', { className: 'px-5 py-4 border-b border-gray-200' },
              h('h2', { className: 'text-[#172b4d] font-bold text-[15px]' }, 'Start Timer')
            ),
            h('div', { className: 'px-5 py-6' },
              h('p', { className: 'text-[#172b4d] text-[13px]' }, 'Would you like to start timer for ', h('span', { className: 'font-bold' }, taskToStart?.id), ' ?'),
              totalLoggedMins >= DAILY_CAP_MINS && h('p', { className: 'text-[#92400e] text-xs mt-2 flex items-center gap-1' },
                h(Icon, { name: 'AlertTriangle', size: 12, color: '#d97706' }),
                `You have already logged ${formatMins(totalLoggedMins)} today. You are Extra/OT by ${formatMins(totalLoggedMins - DAILY_CAP_MINS)}.`
              )
            ),
            h('div', { className: 'px-5 py-3 border-t border-gray-100 flex justify-end items-center gap-3' },
              h('button', { onClick: () => setIsStartConfirmOpen(false), className: 'text-[#42526e] hover:bg-gray-100 px-3 py-1.5 rounded text-[13px] font-medium' }, 'Cancel'),
              h('button', { onClick: confirmStartTimer, className: 'bg-[#2563eb] text-white px-4 py-1.5 rounded text-[13px] font-medium hover:bg-blue-700' }, 'Start')
            )
          )
        ),

        /* ===== STOP TIMER CONFIRM MODAL ===== */
        isStopConfirmOpen && h('div', { className: 'fixed inset-0 bg-black/40 z-[100] flex items-center justify-center' },
          h('div', { className: 'bg-white rounded shadow-xl w-[450px] overflow-hidden' },
            h('div', { className: 'px-5 py-4 border-b border-gray-200' },
              h('h2', { className: 'text-[#172b4d] font-bold text-[15px]' }, 'Stop timer and log work')
            ),
            h('div', { className: 'px-5 py-6' },
              h('p', { className: 'text-[#172b4d] text-[13px]' }, 'This will stop the timer for ', h('span', { className: 'font-bold' }, activeTimerTask?.id), '. Are you sure?'),
              timerStartTimeRef.current && (() => {
                const startDate = new Date(timerStartTimeRef.current);
                const now = new Date();
                if (startDate.getDate() !== now.getDate() || startDate.getMonth() !== now.getMonth() || startDate.getFullYear() !== now.getFullYear()) {
                  return h('div', { className: 'mt-3 p-2 bg-[#fffbeb] text-[#92400e] border border-[#fde68a] rounded text-xs' },
                    'This session crosses midnight. It will be split into 2 records (1 for each day) per FR-08.'
                  );
                }
                return null;
              })()
            ),
            h('div', { className: 'px-5 py-3 border-t border-gray-100 flex justify-end items-center gap-3' },
              h('button', { onClick: () => setIsStopConfirmOpen(false), className: 'text-[#42526e] hover:bg-gray-100 px-3 py-1.5 rounded text-[13px] font-medium' }, 'Cancel'),
              h('button', { onClick: confirmStopTimer, className: 'bg-[#2563eb] text-white px-4 py-1.5 rounded text-[13px] font-medium hover:bg-blue-700' }, 'Stop & Log')
            )
          )
        ),

        /* ===== LOG WORK MODAL ===== */
        isLogWorkModalOpen && h('div', { className: 'fixed inset-0 bg-black/50 z-[100] flex items-center justify-center' },
          h('div', { className: 'bg-white rounded shadow-xl w-[700px] max-h-[90vh] flex flex-col' },
            h('div', { className: 'px-6 py-4 border-b border-gray-200 flex items-center gap-2' },
              h('h2', { className: 'text-[#172b4d] font-semibold text-[17px]' }, 'Log Work'),
              h('span', { className: 'bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded' }, activeTimerTask?.id || 'XCOR-2281')
            ),
            h('div', { className: 'p-6 flex-1 overflow-y-auto' },
              h('div', { className: 'space-y-5' },

                /* Toggles Row */
                h('div', { className: 'flex items-center gap-6 text-[12px] text-gray-600 font-medium flex-wrap' },
                  toggleConfigs.map(({ label, isOn, activeColor, onToggle }) =>
                    h('div', { key: label, className: 'flex items-center gap-2' },
                      h('span', null, label),
                      h('div', {
                        className: `w-7 h-4 rounded-full relative transition-colors cursor-pointer ${isOn ? '' : 'bg-gray-200'}`,
                        style: isOn ? { backgroundColor: activeColor } : {},
                        onClick: onToggle
                      },
                        h('div', { className: `w-3 h-3 bg-white rounded-full absolute top-0.5 shadow-sm transition-all ${isOn ? 'right-0.5' : 'left-0.5'}` })
                      )
                    )
                  )
                ),

                /* Dates & Times */
                h('div', { className: 'grid grid-cols-2 gap-5' },
                  h('div', null,
                    h('label', { className: 'block text-[11px] text-gray-500 mb-1.5 font-medium' }, 'Start Date'),
                    h('input', { type: 'text', value: 'Apr 22, 2026', className: 'w-full border border-gray-300 rounded px-3 py-2 text-[13px]', readOnly: true })
                  ),
                  h('div', null,
                    h('label', { className: 'block text-[11px] text-gray-500 mb-1.5 font-medium' }, 'End Date'),
                    h('input', { type: 'text', value: 'Apr 22, 2026', className: 'w-full border border-gray-300 rounded px-3 py-2 text-[13px]', readOnly: true })
                  ),
                  isTimeInfoEnabled && [
                    h('div', { key: 'st' },
                      h('label', { className: 'block text-[11px] text-gray-500 mb-1.5 font-medium' }, 'Start Time'),
                      h('input', { type: 'text', value: '10:00 SA', className: 'w-full border border-gray-300 rounded px-3 py-2 text-[13px]', readOnly: true })
                    ),
                    h('div', { key: 'et' },
                      h('label', { className: 'block text-[11px] text-gray-500 mb-1.5 font-medium' }, 'End Time'),
                      h('input', { type: 'text', value: '08:00 CH', className: 'w-full border border-gray-300 rounded px-3 py-2 text-[13px]', readOnly: true })
                    )
                  ]
                ),

                /* Cross-Midnight Warning */
                isCrossMidnight && h('div', { className: 'p-3 rounded text-[13px] border bg-[#fffbeb] text-[#92400e] border-[#fde68a]' },
                  h('div', { className: 'flex items-start gap-2' },
                    h(Icon, { name: 'AlertTriangle', size: 16, color: '#d97706', className: 'mt-0.5 shrink-0' }),
                    h('div', null,
                      h('span', { className: 'font-bold block' }, 'Cross-midnight session detected.'),
                      h('span', { className: 'text-xs text-[#b45309] italic mt-1 block' }, 'This session will be split: Record 1 → start date (until 23:59:59), Record 2 → next day (from 00:00:00). Each counted toward its respective day\'s daily total.')
                    )
                  )
                ),

                /* Type & Duration */
                h('div', { className: 'grid grid-cols-2 gap-5' },
                  h('div', null,
                    h('label', { className: 'block text-[11px] text-gray-500 mb-1.5 font-medium' }, 'Type'),
                    h('div', { className: 'border border-gray-300 rounded px-3 py-2 text-[13px] flex justify-between items-center bg-white text-gray-400' },
                      'Type', h(ChevronDown, { size: 14 })
                    )
                  ),
                  h('div', null,
                    h('label', { className: 'block text-[11px] text-gray-500 mb-1.5 font-medium' }, 'Duration'),
                    h('div', { className: `flex items-center justify-between border rounded px-3 py-2 bg-[#f8f9fa] ${isOverLimit ? 'border-[#f59e0b]' : 'border-blue-200'}` },
                      h('input', {
                        type: 'text',
                        value: durationInput,
                        onChange: handleDurationChange,
                        className: 'bg-transparent border-none outline-none text-[13px] text-[#172b4d] w-full font-medium'
                      }),
                      h('span', { className: `text-[9px] font-bold px-1.5 py-0.5 rounded shrink-0 whitespace-nowrap tracking-wide ${tagColor}` }, durationTag)
                    )
                  )
                ),

                /* ---- END TIMER FLOW (FR-04) ---- */
                isTimerMode && h('div', {
                  className: `p-3 rounded text-[13px] border ${
                    !isEditedByUser
                      ? ((remainingIsPositive && !actualExceedsRemaining)
                          ? 'bg-[#f0f4ff] text-[#172b4d] border-blue-100'
                          : 'bg-[#fffbeb] text-[#92400e] border-[#fde68a]')
                      : (isOverLimit ? 'bg-[#fffbeb] text-[#92400e] border-[#fde68a]' : 'hidden')
                  }`
                },
                  h('div', { className: 'flex items-start gap-2' },
                    !isEditedByUser
                      ? (remainingIsPositive && !actualExceedsRemaining
                          ? h(Icon, { name: 'Info', size: 16, color: '#3b82f6', className: 'mt-0.5 shrink-0' })
                          : h('span', { className: 'relative inline-block' },
                              h(Icon, { name: 'AlertTriangle', size: 16, color: '#d97706', className: 'mt-0.5 tooltip-trigger' },
                                !remainingIsPositive && h('span', { className: 'tooltip-text' }, "You are in the Extra/OT zone. Please activate the Extra/OT button to record your overtime.")
                              )
                            )
                        )
                      : (isOverLimit ? h(Icon, { name: 'AlertTriangle', size: 16, color: '#d97706', className: 'mt-0.5 shrink-0' }) : null),
                    h('div', null,
                      /* End Timer — Not edited, remaining > 0, actual ≤ remaining */
                      !isEditedByUser && remainingIsPositive && !actualExceedsRemaining &&
                        h('span', { className: 'font-medium' }, `Actual logged time: ${formatMins(actualMins)}. Remaining today: ${formatMins(remainingTotal)}.`),
                      /* End Timer — Not edited, remaining > 0, actual > remaining */
                      !isEditedByUser && remainingIsPositive && actualExceedsRemaining &&
                        h('span', { className: 'font-bold' }, `Actual logged time: ${formatMins(actualMins)}. You are Extra/OT by ${formatMins(effectiveOverMins)}.`),
                      /* End Timer — Not edited, remaining ≤ 0 */
                      !isEditedByUser && !remainingIsPositive &&
                        h('span', { className: 'font-bold block' }, `You have reached today's 8-hour standard threshold. You are Extra/OT by ${formatMins(effectiveOverMins)}.`),
                      /* End Timer — User edited and over limit */
                      isEditedByUser && isOverLimit &&
                        h('span', { className: 'font-bold' }, `You are Extra/OT by ${formatMins(effectiveOverMins)} compared to today's standard hours.`)
                    )
                  )
                ),

                /* ---- MANUAL LOG FLOW (FR-05) ---- */
                !isTimerMode && !isOver24h && h('div', {
                  className: `p-3 rounded text-[13px] border ${
                    (!isEditedByUser && remainingTotal > 0) || (isEditedByUser && !isOverLimit)
                      ? 'bg-[#f0f4ff] text-[#172b4d] border-blue-100'
                      : 'bg-[#fffbeb] text-[#92400e] border-[#fde68a]'
                  }`
                },
                  h('div', { className: 'flex items-start gap-2' },
                    ((!isEditedByUser && remainingTotal > 0) || (isEditedByUser && !isOverLimit))
                      ? h(Icon, { name: 'Info', size: 16, color: '#3b82f6', className: 'mt-0.5 shrink-0' })
                      : h('span', { className: 'relative inline-block' },
                          h(Icon, { name: 'AlertTriangle', size: 16, color: '#d97706', className: 'mt-0.5 tooltip-trigger' },
                            !remainingIsPositive && h('span', { className: 'tooltip-text' }, "You are in the Extra/OT zone. Please activate the Extra/OT button to record your overtime.")
                          )
                        ),
                    h('div', null,
                      /* Manual: Not over limit */
                      !isEditedByUser && remainingTotal > 0 &&
                        h('span', { className: 'font-medium' }, `You have ${formatMins(remainingTotal)} of standard time left to log today.`),
                      /* Manual: Just opened, already over limit (remaining ≤ 0) */
                      !isEditedByUser && remainingTotal <= 0 &&
                        h('span', { className: 'font-bold block' }, `You have reached today's 8-hour standard threshold. You are Extra/OT by ${formatMins(effectiveOverMins)}.`),
                      /* Manual: Edited to be over limit */
                      isEditedByUser && isOverLimit && !isOver24h &&
                        h('span', { className: 'font-bold' }, `If saved, today's total will be ${formatMins(projectedTotal)} — you are Extra/OT by ${formatMins(effectiveOverMins)} compared to standard hours.`)
                    )
                  )
                ),

                /* 24h Exceeded Warning */
                isOver24h && h('div', { className: 'p-3 rounded text-[13px] border bg-red-50 text-red-700 border-red-200' },
                  h('div', { className: 'flex items-start gap-2' },
                    h(Icon, { name: 'AlertTriangle', size: 16, color: '#dc2626', className: 'mt-0.5 shrink-0' }),
                    h('div', null,
                      h('span', { className: 'font-bold block' }, 'Invalid time: Total work hours cannot exceed 24 hours (1440 minutes) in a day.'),
                      h('span', { className: 'text-xs text-red-600 italic mt-1 block' }, 'Please reduce the duration to stay within the 24-hour limit.')
                    )
                  )
                ),

                /* Description */
                h('div', null,
                  h('textarea', { placeholder: 'Description', className: 'w-full border border-gray-300 rounded px-3 py-2 text-[13px] h-20 resize-none focus:outline-none focus:border-blue-500' })
                )
              )
            ),

            /* Modal Footer */
            h('div', { className: 'px-6 py-4 border-t border-gray-200 flex justify-between items-center rounded-b' },
              h('div', { className: `flex items-center px-3 py-1.5 rounded-full border shadow-sm ${
                isOver24h ? 'bg-red-50 text-red-700 border-red-200' : 'bg-blue-50 text-blue-700 border-blue-100'
              }` },
                h('div', { className: `w-2 h-2 rounded-full mr-2 ${isOver24h ? 'bg-red-600' : 'bg-blue-600'}` }),
                h('span', { className: 'text-xs font-semibold' }, `${formatMins(totalLoggedMins)} logged today`)
              ),
              h('div', { className: 'flex gap-3' },
                h('button', { onClick: () => setIsLogWorkModalOpen(false), className: 'text-[#42526e] border border-gray-300 px-4 py-1.5 rounded text-[13px] font-bold hover:bg-gray-50' }, 'Discard'),
                h('button', {
                  onClick: handleSubmit,
                  disabled: isOver24h,
                  className: `px-6 py-1.5 rounded text-[13px] font-bold shadow-sm ${
                    isOver24h
                      ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                      : 'bg-[#2563eb] text-white hover:bg-blue-700'
                  }`
                }, 'Submit')
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
